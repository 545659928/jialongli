{{ define "main" }}
  <div class="main-grid">
    {{ partial "sidebar.html" . }}

    <article class="content-column">
      <header class="page-header">
        <h1>{{ .Title }}</h1>
        {{ with .Params.summary }}
          <p class="lead">{{ . }}</p>
        {{ end }}
      </header>

      {{ if .Params.toc }}
        <aside class="toc">
          <h2>On This Page</h2>
          {{ .TableOfContents }}
        </aside>
      {{ end }}

      <section class="prose content-block">
        {{ .Content }}
      </section>
    </article>
  </div>
{{ end }}
