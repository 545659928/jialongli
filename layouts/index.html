{{ define "main" }}
  <div class="main-grid">
    {{ partial "sidebar.html" . }}

    <article class="content-column">
      <header class="page-header">
        <h1>{{ .Params.name }}</h1>
        <p class="lead">{{ .Params.role }}</p>
        <p class="tagline">{{ .Params.tagline }}</p>
      </header>

      <section class="prose content-block">
        {{ .Content }}
      </section>

      <section class="content-block">
        <h2>Current Positions</h2>
        <ul>
          {{ range .Params.positions }}
            <li>{{ . }}</li>
          {{ end }}
        </ul>
      </section>
    </article>
  </div>
{{ end }}
